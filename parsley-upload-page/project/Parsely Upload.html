<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F4F5F7;
    --surface: #FFFFFF;
    --ink-1: #0E1726;
    --ink-2: #3A4658;
    --ink-3: #6B7687;
    --ink-4: #9AA3B2;
    --line: #E6E8EC;
    --line-strong: #D6DAE1;
    --accent: #2F6FEB;
    --accent-ink: #1E4FBF;
    --accent-soft: #E8F0FE;
    --accent-softer: #F2F6FE;
    --danger: #D64545;
    --success: #2E8F5A;
    --warn: #B07800;
    --radius-sm: 6px;
    --radius: 8px;
    --radius-lg: 12px;
    --shadow-card: 0 1px 2px rgba(14,23,38,0.04), 0 1px 0 rgba(14,23,38,0.02);
    --shadow-pop: 0 8px 24px rgba(14,23,38,0.08), 0 2px 6px rgba(14,23,38,0.06);
    --font-ui: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    --font-mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, monospace;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: var(--font-ui);
    font-size: 14px;
    color: var(--ink-1);
    background: var(--bg);
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
    font-feature-settings: "cv02", "cv11", "ss01";
  }
  button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; padding: 0; }
  input { font-family: inherit; }
  #root { min-height: 100vh; }
</style>
</head>

<div id="root"></div>

<script type="text/babel" src="parsely-app.jsx"></script>
